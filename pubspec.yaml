name: anshin
description: Anshin — Anxiety & Panic Relief
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.1.4

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.0.4
  firebase_analytics: ^11.2.1
  firebase_crashlytics: ^4.0.4
  firebase_remote_config: ^5.0.4

  # Text-to-speech (offline, uses Android built-in TTS — no API key)
  flutter_tts: ^4.0.2

  # Local database (offline-first for SOS, sessions, journal)
  drift: ^2.18.0
  sqflite: ^2.3.3+1
  sqlite3_flutter_libs: ^0.5.0   # bundles a fresh SQLite binary — required by NativeDatabase on Android
  path: ^1.9.0                   # runtime path joining for DB file location

  # Storage & preferences
  path_provider: ^2.1.3
  shared_preferences: ^2.3.1

  # Notifications
  flutter_local_notifications: ^17.2.1+2

  # Charts (progress screen)
  fl_chart: ^0.68.0

  # Subscriptions (RevenueCat + Google Play Billing)
  purchases_flutter: ^10.0.0

  # Encryption (journal AES-256 client-side)
  encrypt: ^5.0.3
  crypto: ^3.0.3      # SHA-256 key derivation for journal encryption

  # Share sheet (journal completion screen)
  share_plus: ^10.1.4

  # SVG rendering (mascot)
  flutter_svg: ^2.0.10+1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true

  assets:
    - assets/mascot/
    - assets/audio/
    - assets/fonts/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
